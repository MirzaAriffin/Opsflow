<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <meta name="theme-color" content="#13243F" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Opsflow" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Prevent tap highlight on mobile -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; background: #13243F; overscroll-behavior: none; }

      /* iOS cannot actually lock PWA orientation via the manifest (a documented platform
         limitation — Android respects manifest.json's "orientation": "portrait", iOS does not).
         This is the practical fallback: on phone-width screens in landscape, hide the app and
         show a "please rotate back" message instead, rather than letting the layout break. */
      #orientation-guard { display: none; }
      @media (orientation: landscape) and (max-width: 900px) {
        #root { display: none; }
        #orientation-guard {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          height: 100vh; gap: 16px; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          text-align: center; padding: 24px;
        }
      }
    </style>

    <title>Opsflow</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="orientation-guard">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
        <rect x="7" y="2" width="10" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/>
      </svg>
      <div style="font-size:16px; font-weight:700;">Please rotate your device</div>
      <div style="font-size:13px; opacity:0.7; max-width:260px;">Opsflow works best in portrait mode.</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
